# UniFi ThreatFlow Hub — host nginx server block
# Drop into /etc/nginx/sites-available/ then symlink into sites-enabled/.
# Run `certbot --nginx -d threatflow.amspec.group` to provision the cert
# (certbot will rewrite this file in place to add the SSL block).

server {
    listen 80;
    listen [::]:80;
    server_name threatflow.amspec.group;

    # Allow LE HTTP-01 challenge before TLS is in place
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name threatflow.amspec.group;

    # certbot fills in ssl_certificate / ssl_certificate_key

    # Security headers (defensive defaults; tune in Phase 7)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    client_max_body_size 25m;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 90s;

    # FastAPI backend — mounted under /api/
    location /api/ {
        proxy_pass http://127.0.0.1:18091;
    }

    # Optional: SSE / WebSocket future use
    location /ws/ {
        proxy_pass http://127.0.0.1:18091;
        proxy_buffering off;
        proxy_read_timeout 24h;
    }

    # Next.js frontend — everything else
    location / {
        proxy_pass http://127.0.0.1:18090;
    }
}
