# Bootstrap server block — HTTP only.
# Drop in BEFORE DNS is set up + certbot is run. Once `certbot --nginx -d
# threatflow.amspec.group` succeeds, replace this file with
# threatflow.amspec.group.conf (the HTTPS-redirect variant), then reload.

server {
    listen 80;
    listen [::]:80;
    server_name threatflow.amspec.group;

    # Reserve LE HTTP-01 path
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    client_max_body_size 25m;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 90s;

    location /api/ {
        proxy_pass http://127.0.0.1:18091;
    }
    location /ws/ {
        proxy_pass http://127.0.0.1:18091;
        proxy_buffering off;
        proxy_read_timeout 24h;
    }
    location / {
        proxy_pass http://127.0.0.1:18090;
    }
}
